<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Forms</title></head>
<body>
<!-- This file exists solely for Netlify Forms detection.
     The actual form is submitted via AJAX from index.html.
     Do not delete this file. -->
<form name="feedback" method="POST" data-netlify="true" netlify hidden>
  <input type="hidden" name="form-name" value="feedback">
  <input name="name">
  <input name="role">
  <input name="age">
  <input name="source">
  <input name="rating">
  <textarea name="comments"></textarea>
  <input name="would-recommend">
</form>
</body>
</html>
